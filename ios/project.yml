name: Perezoso
options:
  bundleIdPrefix: com.perezoso
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug
  xcodeVersion: "15.3"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_UPCOMING_FEATURE_BARE_SLASH_REGEX_LITERALS: YES
    CLANG_ENABLE_MODULES: YES
    ENABLE_BITCODE: NO
    DEVELOPMENT_TEAM: ""                      # fill in via Xcode signing UI
    CODE_SIGN_STYLE: Automatic

# ── Swift Package dependencies ───────────────────────────────────────
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.13.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "7.0.0"

# ── Targets ──────────────────────────────────────────────────────────
targets:
  Perezoso:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Perezoso
        excludes:
          - "**/*.md"
    resources:
      - path: Perezoso/Resources/Assets.xcassets
      - path: Perezoso/Resources/Fonts
        buildPhase: resources
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    info:
      path: Perezoso/Resources/Info.plist
      properties:
        CFBundleDisplayName: Perezoso
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "35"
        UILaunchScreen:
          UIColorName: BackgroundColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleDefault
        UIUserInterfaceStyle: Automatic
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLName: com.perezoso.app.oauth
            CFBundleURLSchemes:
              - perezoso
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        LSApplicationQueriesSchemes:
          - https
          - mailto
        # Read the Supabase / RevenueCat keys from Config.xcconfig so
        # Secrets.swift can pick them up at runtime via Bundle.main.
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        REVENUECAT_IOS_KEY: $(REVENUECAT_IOS_KEY)
    entitlements:
      path: Perezoso/Resources/Perezoso.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
        com.apple.developer.associated-domains:
          - applinks:perezoso.vercel.app
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: Kingfisher
        product: Kingfisher
    settings:
      base:
        INFOPLIST_FILE: Perezoso/Resources/Info.plist
        PRODUCT_NAME: Perezoso
        PRODUCT_BUNDLE_IDENTIFIER: com.perezoso.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ENABLE_PREVIEWS: YES

  PerezosoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PerezosoTests
    dependencies:
      - target: Perezoso
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Perezoso.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Perezoso"

schemes:
  Perezoso:
    build:
      targets:
        Perezoso: all
        PerezosoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PerezosoTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
